domain: research
version: "0.1"

artifact_types:
  Script:
    properties:
      name:
        required: true
        description: "Human-readable script name"
      path:
        required: true
        description: "Filesystem path relative to project root"
      description:
        category: documentation
        description: "What this script does (1-2 sentences)"
      inputs:
        category: documentation
        description: "Input data files or parameters"
      outputs:
        category: documentation
        description: "What the script produces"
      parameters:
        category: documentation
        description: "Configurable parameters and their defaults"
      usage:
        category: documentation
        description: "How to run: command, arguments, environment"
      dependencies:
        category: documentation
        description: "Required packages, data files, other scripts"

  Result:
    properties:
      value:
        required: true
        description: "The numeric or categorical result value"
      units:
        required: true
        description: "Units of measurement"
      description:
        required: true
        description: "What this result measures"
      interpretation:
        category: documentation
        description: "What the value means in context"
      methodology_note:
        category: documentation
        description: "Brief note on how it was computed"

  DataFile:
    properties:
      name:
        required: true
        description: "Filename"
      path:
        required: true
        description: "Filesystem path relative to project root"
      format:
        category: documentation
        description: "File format (CSV, JSON, JSONL, etc.)"
      schema_description:
        category: documentation
        description: "Columns/fields and their meanings"
      provenance_description:
        category: documentation
        description: "How this data was produced or obtained"
      row_count:
        category: documentation
        description: "Number of records (approximate is fine)"

  Figure:
    properties:
      name:
        required: true
        description: "Figure identifier (e.g., fig_1_convergence)"
      caption:
        required: true
        description: "Figure caption text"
      description:
        required: true
        description: "What the figure shows"
      figure_number:
        category: system
        description: "Display number (e.g., '2.3' for Chapter 2, Figure 3) — computed from graph position at build time"
      interpretation:
        category: documentation
        description: "Key takeaway from this figure"
      data_source:
        category: documentation
        description: "Which DataFiles/Results this figure renders"
      file_path:
        category: documentation
        description: "Path to the generated figure file"

  Table:
    properties:
      name:
        required: true
        description: "Table identifier (e.g., 'table_comparison_results')"
      caption:
        required: true
        description: "Table caption text"
      table_number:
        category: system
        description: "Display number (e.g., '5.1' for Chapter 5, Table 1) — computed from graph position at build time"
      generating_script:
        category: documentation
        description: "Name of Script artifact that produces this table"
      data_sources:
        category: documentation
        description: "DataFile artifacts that feed this table"
      file_path:
        category: documentation
        description: "Path to generated table file if applicable"

  PipelineRun:
    properties:
      script_id:
        required: true
        description: "Artifact ID of the Script that was run"
      run_timestamp:
        required: true
        description: "When the run started"
      environment:
        category: documentation
        description: "Python version, OS, key package versions"
      runtime:
        category: documentation
        description: "Wall-clock time"
      reproduction_command:
        category: documentation
        description: "Exact command to reproduce this run"

  PaperSection:
    properties:
      name:
        required: true
        description: "Section identifier"
      title:
        required: true
        description: "Section title"
      file_path:
        category: system
        description: "Path to the section markdown file"
      content_hash:
        category: system
        description: "SHA-256 hash of file content at last sync"
      sequence:
        category: system
        description: "Ordering within parent (1, 2, 3...). Determines document order and figure/table numbering."
      depth:
        category: system
        description: "Hierarchy depth: 0 = chapter/top-level, 1 = section, 2 = subsection"
      section_type:
        category: system
        description: "Type of section: 'chapter', 'section', 'frontmatter', 'backmatter', 'appendix'. Determines numbering behavior. Defaults to 'chapter' for depth=0, 'section' for depth>0."

  Citation:
    properties:
      key:
        required: true
        description: "BibTeX key"
      title:
        required: true
        description: "Paper/source title"

  ResearchTask:
    properties:
      description:
        required: true
        description: "What needs to be done"

  LabNotebookEntry:
    properties:
      summary:
        required: true
        description: "Session summary"

  SRS_Requirement:
    properties:
      requirement_id:
        required: true
        description: "Formal requirement identifier (e.g., FR-001)"
      description:
        required: true
        description: "What the requirement specifies"

  AgentRole:
    properties:
      name:
        required: true
        description: "Role identifier (e.g., verifier, methods, red_team)"
      display_name:
        required: true
        description: "Human-readable role name"
      system_prompt:
        required: true
        description: "Full system prompt for a CC worker assuming this role"
      responsibilities:
        category: documentation
        description: "What this role is responsible for"
      retrieval_profile:
        category: documentation
        description: "What graph context this role needs"
      cli_tools:
        category: documentation
        description: "Which seldon CLI commands this role uses"
      checks_performed:
        category: documentation
        description: "What this role verifies or validates"
      does_not_do:
        category: documentation
        description: "Explicit boundaries"

  Workflow:
    properties:
      name:
        required: true
        description: "Workflow identifier"
      display_name:
        required: true
        description: "Human-readable workflow name"
      description:
        required: true
        description: "What this workflow accomplishes"
      trigger:
        category: documentation
        description: "When to use this workflow"
      decomposition_strategy:
        category: documentation
        description: "How the leader decomposes the directive"
      success_criteria:
        category: documentation
        description: "How to verify completion"
      notes:
        category: documentation
        description: "Lessons learned, caveats"

  OntologyTerm:
    properties:
      term_id:
        required: true
        description: "Namespaced identifier (e.g., 'ontology:validity:SFV')"
      name:
        required: true
        description: "Human-readable term name"
      definition:
        required: true
        description: "Canonical definition text"
      category:
        required: true
        description: "Term category (e.g., 'framework', 'sub_dimension', 'threat', 'severity', 'metric', 'countermeasure', 'classical_validity', 'terminology_decision', 'related_term')"
      source_vocabulary:
        required: true
        description: "Source vocabulary path (e.g., 'validity/VALIDITY_VOCABULARY.md')"
      citations:
        category: documentation
        description: "Source citation keys (e.g., '[Webb-2026a]')"
      namespace:
        category: system
        description: "Ontology namespace (e.g., 'ontology:validity')"
      inheritance:
        category: system
        description: "Inheritance mode on replicas: always 'read-only'"
      content_hash:
        category: system
        description: "SHA-256 of the definition text for change detection"
      epoch:
        category: system
        description: "Master epoch at which this term was created or last updated"

  Issue:
    properties:
      description:
        required: true
        description: "What the issue is — the problem statement"
      issue_type:
        required: true
        description: "Category of problem. Values: factual_error, citation_gap, unsupported_claim, terminology_inconsistency, internal_contradiction, missing_content, stale_content, structural_flow, style_formatting"
      importance:
        required: true
        description: "Eisenhower importance axis (intrinsic, rarely changes). Values: high, medium, low"
      urgency:
        required: true
        description: "Eisenhower urgency axis (contextual, changes with workflow). Values: high, medium, low"
      detection_method:
        required: true
        description: "How the issue was found. Values: automated_check, audit, incidental, build_failure"
      target:
        required: true
        description: "What needs to change to resolve it. Values: content, citation, terminology, data, structure"
      resolution_notes:
        category: documentation
        description: "What was done to resolve the issue — captured at resolution time"

relationship_types:
  cites:
    from_types: [PaperSection, Figure]
    to_types: [Result, Citation]
  generated_by:
    from_types: [Result, Figure, Table]
    to_types: [Script]
  computed_from:
    from_types: [Result]
    to_types: [DataFile]
  implements:
    from_types: [Script, Result]
    to_types: [SRS_Requirement]
  blocks:
    from_types: [ResearchTask]
    to_types: [Result, PaperSection, Figure]
  depends_on:
    from_types: [ResearchTask]
    to_types: [Result, DataFile, Script]
  validates:
    from_types: [Result]
    to_types: [Result]
  produced_by:
    from_types: [DataFile]
    to_types: [PipelineRun]
  contains:
    from_types: [Figure]
    to_types: [Result]
  derived_from:
    from_types: [Result]
    to_types: [LabNotebookEntry, Citation, Result]
  includes_role:
    from_types: [Workflow]
    to_types: [AgentRole]
  leads:
    from_types: [AgentRole]
    to_types: [Workflow]
  defines_sub_dimension:
    from_types: [OntologyTerm]
    to_types: [OntologyTerm]
  defines_threat:
    from_types: [OntologyTerm]
    to_types: [OntologyTerm]
  addresses_threat:
    from_types: [OntologyTerm]
    to_types: [OntologyTerm]
  measures_threat:
    from_types: [OntologyTerm]
    to_types: [OntologyTerm]
  precondition_for:
    from_types: [OntologyTerm]
    to_types: [OntologyTerm]
  references_ontology:
    from_types: [PaperSection, ResearchTask, LabNotebookEntry]
    to_types: [OntologyTerm]

  contains_section:
    from_types: [PaperSection]
    to_types: [PaperSection]

  appears_in:
    from_types: [Figure, Table]
    to_types: [PaperSection]

  references_figure:
    from_types: [PaperSection]
    to_types: [Figure]

  references_table:
    from_types: [PaperSection]
    to_types: [Table]

  tabulates:
    from_types: [Table]
    to_types: [Result]

  context_for:
    from_types: [DataFile, Citation, LabNotebookEntry, PaperSection]
    to_types: [PaperSection, DataFile]

  cross_references:
    from_types: [PaperSection]
    to_types: [PaperSection]

  supports:
    from_types: [Result, Citation, DataFile, Figure, Table]
    to_types: [PaperSection]

  affects:
    from_types: [Issue]
    to_types: [PaperSection]

  blocked_by:
    from_types: [Issue]
    to_types: [Issue]

  related_issue:
    from_types: [Issue]
    to_types: [Issue]

  resolved_by:
    from_types: [Issue]
    to_types: [ResearchTask]

state_machines:
  Result:
    proposed: [verified, rejected]
    verified: [published, stale]
    published: [stale]
    stale: [verified]
    rejected: []

  ResearchTask:
    proposed: [accepted, rejected]
    accepted: [in_progress]
    in_progress: [completed, blocked]
    completed: [verified]
    blocked: [in_progress]
    verified: []
    rejected: []

  Script:
    proposed: [active, deprecated]
    active: [deprecated, stale]
    deprecated: []
    stale: [active]

  DataFile:
    proposed: [registered]
    registered: [stale]
    stale: [registered]

  PaperSection:
    proposed: [draft, review]
    draft: [review, stale]
    review: [published, draft]
    published: [stale]
    stale: [draft]

  Figure:
    proposed: [draft, review]
    draft: [review, stale]
    review: [published, draft]
    published: [stale]
    stale: [draft]

  Table:
    proposed: [draft, review]
    draft: [review, stale]
    review: [published, draft]
    published: [stale]
    stale: [draft]

  Citation:
    proposed: [verified]
    verified: [stale]
    stale: [verified]

  LabNotebookEntry:
    proposed: [finalized]
    finalized: []

  SRS_Requirement:
    proposed: [accepted, rejected]
    accepted: [implemented, stale]
    implemented: [verified]
    verified: [stale]
    stale: [accepted]
    rejected: []

  PipelineRun:
    proposed: [running]
    running: [completed, failed]
    completed: [stale]
    failed: [proposed]
    stale: []

  AgentRole:
    proposed: [active, rejected]
    active: [deprecated, stale]
    deprecated: []
    stale: [active]
    rejected: []

  Workflow:
    proposed: [active, rejected]
    active: [deprecated, stale]
    deprecated: []
    stale: [active]
    rejected: []

  OntologyTerm:
    proposed: [active]
    active: [stale, deprecated]
    stale: [active]
    deprecated: []

  Issue:
    open: [in_progress, resolved, wont_fix]
    in_progress: [resolved, blocked, open]
    blocked: [in_progress, open]
    resolved: [verified, open]
    verified: []
    wont_fix: [open]
